<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="./style/admin.css">
  <link rel="icon" href="./img/favicon.svg?v=2" type="image/svg+xml">  
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Painel Editorial</title>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-area" class="login-container">

  <div class="login-box">
    <span class="login-label">acesso restrito</span>
    <h1 class="login-title">Painel</h1>

    <input id="email" placeholder="Email" autocomplete="off">
    <input id="senha" type="password" placeholder="Senha" autocomplete="new-password">

    <button id="btnLogin">Entrar</button>

    <p id="erro-login" class="login-error">
      Email ou senha inválidos
    </p>
  </div>

</div>

<!-- 🔥 ADMIN -->
<div id="admin-area" style="display:none;">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-content">
      <div class="user-info">
        <h1>Painel editorial</h1>
        <span>gerenciar conteúdos</span>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <aside class="sidebar-pc">
    <nav class="side-nav">
      <a href="#" id="nav-home" class="active">Início</a>
      <a href="#" id="nav-novo">Novo</a>
      <a href="#" id="nav-posts">Posts</a>
      <a href="#" id="logout">Sair</a>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main-container">

    <section class="content-area">

      <!-- 🏠 HOME -->
      <div id="home-admin" class="home-hero">
        <span class="hero-label">painel editorial</span>
        <h1 class="hero-title">
          Gerencie seus <span>conteúdos</span>
        </h1>
      </div>

      <!-- ✍️ NOVO -->
      <div id="novo-admin" style="display:none;">

        <div class="editor-grid">
        
          <!-- ✍️ EDITOR -->
          <div class="card-poema" style="cursor:default;">
          
            <div class="label-categoria">Novo conteúdo</div>
          
            <input id="titulo" placeholder="Título" style="margin:20px 0; width:100%;">
            
            <div class="editor-toolbar">
              <button data-action="bold"><b>B</b></button>
              <button data-action="italic"><i>I</i></button>
              <button data-action="strike"><s>S</s></button>

              <span class="divider"></span>

              <button data-action="ul">•</button>
              <button data-action="quote">❝</button>

              <span class="divider"></span>

              <button data-action="left">≡</button>
              <button data-action="center">≣</button>
              <button data-action="right">≡</button>
            </div>

            <div id="conteudo" class="editor-text" contenteditable="true"></div>
            
            <div id="drop-area" class="capa-container">
              <span style="font-size:0.7rem;">clique ou arraste imagem</span>
              <input type="file" id="imagem" hidden>
            </div>
          
            <!-- 🔥 WRAPPER DA IMAGEM -->
            <div id="preview-imagem-container" style="display:none;">
              <img id="preview" style="margin-top:20px; width:100%;">
            </div>

            <!-- 🔥 TOGGLE PREMIUM -->
            <label class="toggle">
              <input type="checkbox" id="tipoFoto">
              <span class="slider"></span>
              <span class="toggle-label">Post com imagem</span>
            </label>

            <label style="margin-top:10px">Data de publicação</label>
            <input type="datetime-local" id="dataPublicacao" class="input-data">

            <div style="margin-top: 20px; display: flex; gap: 10px;">
              <button id="btn-publicar">Publicar agora</button>
              <button id="btn-agendar">Agendar</button>
            </div>
          
          </div>
        
          <!-- 👁️ PREVIEW -->
          <div class="card-poema preview-box">
          
            <div class="label-categoria">Preview</div>
          
            <h2 id="preview-titulo" style="margin-top:20px;"></h2>
          
            <div id="preview-conteudo" class="preview-text"></div>
          
          </div>
        
        </div>

      </div>

      <!-- 📋 POSTS -->
      <div id="posts-admin" style="display:none;">
        <div class="grid-poemas">
          <div id="lista-admin"></div>
        </div>
      </div>

    </section>

  </main>

</div>

<!-- JS -->
<script type="module" src="./js/admin.js"></script>

</body>
</html>
